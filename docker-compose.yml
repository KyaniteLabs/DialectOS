services:
  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    environment:
      DIALECTOS_DEMO_HOST: 0.0.0.0
      DIALECTOS_DEMO_PORT: 8080
      LLM_API_URL: ${LLM_API_URL:-http://ollama:11434/v1/chat/completions}
      LLM_API_FORMAT: ${LLM_API_FORMAT:-openai}
      LLM_MODEL: ${LLM_MODEL:-${DIALECTOS_DEMO_MODEL:-qwen2.5:7b-instruct}}
      LLM_ALLOW_LOCAL: "1"
    ports:
      - "8080:8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.dialectos.entrypoints=websecure
      - traefik.http.routers.dialectos.rule=Host(`dialectos.kyanitelabs.tech`)
      - traefik.http.routers.dialectos.tls=true
      - traefik.http.routers.dialectos.tls.certresolver=letsencrypt
      - traefik.http.services.dialectos.loadbalancer.server.port=8080

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    profiles:
      - setup
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "${DIALECTOS_DEMO_MODEL:-qwen2.5:7b-instruct}"]
    depends_on:
      - ollama

volumes:
  ollama-models:
